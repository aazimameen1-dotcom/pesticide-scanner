<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesticide Package Scanner</title>
    <!-- Use a modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link our custom styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Include QR Code scanner library (zxing) or html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <!-- Background element for rich aesthetic -->
    <div class="blob-c"></div>
    <div class="blob-b"></div>

    <main class="glass-container">
        <header>
            <h1><span class="highlight">Eco</span>Scan</h1>
            <p>Pesticide Package Tracking & Database Entry System</p>
        </header>

        <section class="scanner-section">
            <div id="reader-container" class="card">
                <video id="video-feed" autoplay playsinline class="hidden" background="#000" style="width: 100%; max-height: 400px; object-fit: contain; border-radius: var(--radius-sm); margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5);"></video>
                <canvas id="snapshot-canvas" style="display: none;"></canvas>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                    <button id="snap-btn" class="btn primary-btn hidden" style="flex: 1;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                        Take Photo & Analyze
                    </button>
                    <button id="switch-cam-btn" class="btn outline-btn hidden" style="padding: 0.6rem 1rem;" title="Switch Camera">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/><path d="M13 5h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5"/><circle cx="12" cy="12" r="3"/><path d="m18 22-3-3 3-3"/><path d="m6 2 3 3-3 3"/></svg>
                    </button>
                </div>
                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="start-scan-btn" class="btn primary-btn" style="flex: 1;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        Live Camera
                    </button>
                    <!-- File input for capturing image natively -->
                    <input type="file" id="capture-image-input" accept="image/*" capture="environment" style="display: none;">
                    <button id="capture-btn" class="btn primary-btn" style="flex: 1; background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                        Capture Image
                    </button>
                    <!-- Fallback manual entry button -->
                    <button id="manual-entry-btn" class="btn outline-btn" style="flex: 1;">Manual</button>
                </div>
            </div>

            <!-- Manual Entry Form (Hidden by default) -->
            <div id="manual-form" class="card hidden">
                <h3>Manual Package Entry</h3>
                <form id="record-form">
                    <div class="input-group">
                        <label for="package-name">Package ID / Name</label>
                        <input type="text" id="package-name" placeholder="E.g., PestBuster-400X" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn primary-btn w-100">Record Entry to Database</button>
                    <button type="button" id="cancel-manual-btn" class="btn text-btn w-100 mt-2">Cancel</button>
                </form>
            </div>
        </section>

        <!-- Status / Notifications -->
        <div id="notification" class="notification"></div>

        <!-- Recent Scans Section -->
        <section class="recent-scans">
            <h3>Recent Database Entries</h3>
            <div class="table-container">
                <table id="scans-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Package Name</th>
                            <th>Scan Date & Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="scans-list">
                        <!-- Dynamic content injected here -->
                    </tbody>
                </table>
            </div>
            <p id="no-scans-msg" class="empty-state">No packages scanned yet.</p>
        </section>
    </main>

    <!-- AI Info Modal -->
    <div id="ai-modal" class="glass-container hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; max-width: 500px;">
        <h3 id="ai-modal-title" style="margin-bottom: 1rem; color: var(--primary-light);">AI Analysis</h3>
        <p id="ai-modal-content" style="line-height: 1.6; color: var(--text-muted);">Loading...</p>
        <button id="ai-modal-close" class="btn outline-btn mt-2 w-100">Close</button>
    </div>
    
    <!-- Image View Modal -->
    <div id="image-modal" class="glass-container hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; max-width: 90vw; width: 500px; padding: 1.5rem; text-align: center; max-height: 90vh; display: flex; flex-direction: column;">
        <h3 id="image-modal-title" style="margin-bottom: 1rem; color: var(--primary-light);">Package View</h3>
        <div style="flex: 1; overflow-y: auto;">
            <img id="image-modal-content" src="" style="max-width: 100%; max-height: 40vh; border-radius: var(--radius-sm); box-shadow: 0 4px 20px rgba(0,0,0,0.5); object-fit: contain; margin-bottom: 1rem;">
            <div id="image-modal-info" style="line-height: 1.6; color: var(--text-main); text-align: left; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1rem; font-size: 0.95rem;">
                Loading intelligence...
            </div>
        </div>
        <button id="image-modal-close" class="btn outline-btn w-100">Close View</button>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="glass-container hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; max-width: 500px; width: 90%; padding: 1.5rem;">
        <h3 style="margin-bottom: 1rem; color: var(--primary-light);">Edit Scan Entry</h3>
        <form id="edit-form">
            <input type="hidden" id="edit-id">
            <div class="input-group">
                <label for="edit-package-name">Package Name</label>
                <input type="text" id="edit-package-name" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="edit-scan-date">Scan Date & Time</label>
                <input type="datetime-local" id="edit-scan-date" required>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn primary-btn w-100">Save Changes</button>
                <button type="button" id="edit-modal-close" class="btn outline-btn w-100">Cancel</button>
            </div>
        </form>
    </div>

    <div id="ai-modal-backdrop" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99;"></div>

    <!-- Custom App Logic -->
    <script src="app.js"></script>
</body>
</html>
